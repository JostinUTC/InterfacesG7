{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>U.E.F. Colegio Militar N.º 13 "Patria"</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'assets/bootstrap/css/bootstrap.min.css' %}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#11141a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            width:420px;
            background:#fff;
            border-radius:15px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,.35);
            border-top:6px solid #ffb400;
        }

        .login-icon{
            width:90px;
            height:90px;
            margin:auto;
            margin-bottom:15px;
            border-radius:50%;
            background:#ffb400;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 8px 20px rgba(255,180,0,.35);
        }

        .login-icon i{
            font-size:42px;
            color:#11141a;
        }

        .institution-name{
            text-align:center;
            color:#2c3e50;
            font-size:18px;
            font-weight:600;
            line-height:1.5;
            margin-bottom:25px;
        }

        h2{
            text-align:center;
            font-weight:600;
            color:#2c3e50;
            margin-bottom:8px;
        }

        .subtitle{
            text-align:center;
            color:#7f8c8d;
            font-size:14px;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:500;
            color:#34495e;
            margin-bottom:8px;
        }

        .input-group-text{
            background:#ffb400;
            color:#11141a;
            border:none;
            font-size:18px;
        }

        .form-control{
            border:1px solid #dcdde1;
            padding:12px;
            font-size:14px;
        }

        .form-control:focus{
            border-color:#ffb400;
            box-shadow:0 0 0 .20rem rgba(255,180,0,.25);
        }

        .btn-custom{
            background:#ffb400;
            color:#11141a;
            font-weight:600;
            padding:12px;
            border:none;
            border-radius:8px;
            transition:.3s;
        }

        .btn-custom:hover{
            background:#e0a100;
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(255,180,0,.3);
        }

        .back-link{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#ffb400;
            font-weight:500;
            transition:.3s;
        }

        .back-link:hover{
            color:#d99800;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="login-icon">
        <i class="bi bi-mortarboard-fill"></i>
    </div>

    <div class="institution-name">
        U.E.F. Colegio Militar N.º 13<br>
        <strong>"Patria"</strong>
    </div>

    <h2>Iniciar Sesión</h2>

    <p class="subtitle">
        Plataforma Académica Institucional
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Usuario / Identificación
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-person-fill"></i>
                </span>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Ingrese su usuario"
                    required>

            </div>

        </div>

        <div class="mb-5">

            <label class="form-label">
                Contraseña
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="••••••••"
                    required>

            </div>

        </div>

        <button type="submit" class="btn btn-custom w-100">

            <i class="bi bi-box-arrow-in-right me-2"></i>

            Ingresar al Sistema

        </button>

    </form>

    <a href="/" class="back-link">
        <i class="bi bi-arrow-left"></i>
        Volver al Inicio
    </a>

</div>

</body>
</html>
