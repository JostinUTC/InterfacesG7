{% load static %}
{% include 'header.html' %}

<div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin-top: 0; background-image: url('{% static 'public/images/slider_background.jpg' %}'); background-repeat: no-repeat; background-size: cover; background-position: center center;">
    <h3 style="text-align: center; margin-bottom: 25px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.6);" class="fw-bold">
        <i class="bi bi-lock-fill"></i> INGRESO AL SISTEMA
    </h3>
   <form action="{% url 'login' %}" method="post" style="width: 450px; background-color: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);">
        {% csrf_token %}
        <label for="">Usuario:</label>
        <input type="text" placeholder="Ingrese usuario" name="username" id="username" required class="form-control alert alert danger">
        <input type="password" placeholder="Ingrese contraseña" name="password" id="password" required class="form-control alert alert danger">
        <button type="submit" class="btn btn-success form-control alert">Iniciar Sesión</button>
    </form>
</div>

{% if mensaje %}
<script>
    alert("{{ mensaje }}");
</script>
{% endif %}

{% include 'footer.html' %}
