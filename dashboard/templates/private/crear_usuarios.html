{% load static %}

{% include "private/header2.html" %}
<form action="" method= "post">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input type="text" name="username" class="form-control" required placeholder="Usuario">

    </div>
    <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" name="email" class="form-control" required placeholder="Correo institucional">
    </div>
    <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" name="password" class="form-control" required placeholder="Contraseña">
    </div>
    <button  type="submit" class="btn btn-outline-success">Guardar</button>
    <a href="{% url 'listar_usuarios' %}" class="btn btn-outline-danger">Cancelar</a>
</form>
{% include "private/footer.html" %}
