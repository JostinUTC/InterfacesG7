{% load static %}

{% include "private/header2.html" %}
<form action="" method= "post">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Nuevo nombre de usuario</label>
        <input type="text" name="username_edit" value="{{ usuario.username }}" class="form-control" required placeholder="Usuario">

    </div>
    <div class="form-group">
        <label for="email">Nuevo Correo Electrónico</label>
        <input type="email" name="email_edit" value="{{ usuario.email }}" class="form-control" required placeholder="Correo institucional">
    </div>
    <div class="form-group">
        <label for="password">Nueva Contraseña:</label>
        <input type="password" name="password_edit" class="form-control" placeholder="Contraseña">
    </div>
    <button  type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'listar_usuarios' %}" class="btn btn-danger">Cancelar</a>
</form>
{% include "private/footer.html" %}
