{% load static %}
{% include "private/header2.html" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<div class="container mt-4">
    <h2>Editar Materia</h2>
    <br>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
            <label for="">Nuevo Nombre de la Materia:</label>
            <input type="text" name="nombreMateria" class="form-control" id="nombreMateria_edit" required>
        </div>
        <div class="mb-3">
            <label for="">Nuevo Precio de la Materia:</label>
            <input type="number" name="precioMateria" class="form-control" id="precioMateria_edit" required>
        </div>
        <div class="mb-3">
            <label for="">Cambiar Créditos de la Materia:</label>
            <input type="number" class="form-control" id="creditosMateria_edit" name="creditosMateria" required>
        </div>
        <div class="mb-3">
            <label for=""> Nuevo Número de Estudiantes:</label>
            <input type="number" class="form-control" id="num_estudiantesMateria_edit" name="num_estudiantesMateria" required>
        </div>
       <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-1"></i> Actualizar Materia
        </button>
        <a href="{% url 'listar_materias' %}" class="btn btn-outline-danger">
            <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
        </a>
</div>

{% include "private/footer.html" %}
