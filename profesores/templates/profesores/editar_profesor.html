{% load static %}
{% include "private/header2.html" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<div class="container mt-4">
   <h3 class="text-primary mb-3"><i class="bi bi-pencil-square me-2"></i> Formulario de Modificación</h3>
<hr>
    <br>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
           <label for=""><i class="bi bi-book text-primary me-1"></i> Nombre del Profesor:</label>
            <input type="text" name="nombreMateria" class="form-control shadow-sm" id="nombreMateria_edit" required>
        </div>
        <div class="mb-3">
            <label for="">Sueldo del Profesor:</label>
            <input type="number" name="precioMateria" class="form-control shadow-sm" id="precioMateria_edit" required>
        </div>
        <div class="mb-3">
<label for=""><i class="bi bi-star-fill text-warning me-1"></i>Curso del profesor:</label>
            <input type="number" class="form-control shadow-sm" id="creditosMateria_edit" name="creditosMateria" required>
        </div>
        
       <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-1"></i> Actualizar Profesor
        </button>
        <a href="{% url 'listar_materias' %}" class="btn btn-outline-danger">
            <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
        </a>
</div>

{% include "private/footer.html" %}
