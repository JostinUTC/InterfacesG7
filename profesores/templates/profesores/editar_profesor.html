{% load static %}
{% include "private/header2.html" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="container mt-4">
    <h3 class="text-primary mb-3"><i class="bi bi-pencil-square me-2"></i> Formulario de Modificación</h3>
    <hr>
    <br>
    
    <form method="POST" action="{% url 'editar_profesor' profesores.id %}">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="nombreProfesor"><i class="bi bi-book text-primary me-1"></i> Nombre del Profesor:</label>
            <input type="text" name="nombreProfesor" value="{{ profesores.nombre_profesor }}" class="form-control shadow-sm" id="nombreProfesor" required>
        </div>
        
        <div class="mb-3">
            <label for="sueldoProfesor"><i class="bi bi-currency-dollar text-success me-1"></i> Sueldo del Profesor:</label>
            <input type="number" step="0.01" name="sueldoProfesor" value="{{ profesores.sueldo_profesor }}" class="form-control shadow-sm" id="sueldoProfesor" required>
        </div>
        
        <div class="mb-3">
            <label for="cursoProfesor"><i class="bi bi-star-fill text-warning me-1"></i> Curso del profesor:</label>
            <input type="number" name="cursoProfesor" value="{{ profesores.curso_profesor }}" class="form-control shadow-sm" id="cursoProfesor" required>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle me-1"></i> Actualizar Profesor
            </button>
            <a href="{% url 'listar_profesores' %}" class="btn btn-outline-danger">
                <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
            </a>
        </div>
    </form> </div>

{% include "private/footer.html" %}
